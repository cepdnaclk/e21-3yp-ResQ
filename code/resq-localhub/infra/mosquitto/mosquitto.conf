# ResQ Local Hub local MQTT broker configuration.
# This is intended for local-first desktop workflows on instructor PCs.

persistence true
persistence_location ./data/

# Standard MQTT TCP listener for local services.
listener 1883 127.0.0.1
protocol mqtt

# Optional WebSocket listener for future local web-based tooling.
listener 9001 127.0.0.1
protocol websockets

# Keep access local for the first pass.
allow_anonymous true
