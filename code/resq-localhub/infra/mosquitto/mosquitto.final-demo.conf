persistence false
log_dest stdout

# Final/demo mode: authenticated MQTT clients with ACLs.
# Generate infra/mosquitto/passwords locally with mosquitto_passwd.
# Do not commit the generated passwords file.
password_file infra/mosquitto/passwords
acl_file infra/mosquitto/acl.final-demo
allow_anonymous false

listener 1883 0.0.0.0
protocol mqtt

listener 9001 0.0.0.0
protocol websockets
