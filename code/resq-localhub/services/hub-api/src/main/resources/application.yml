server:
  port: ${HUB_API_PORT:18080}

spring:
  application:
    name: hub-api

resq:
  localhub:
    backend:
      advertised-host: ${RESQ_BACKEND_ADVERTISED_HOST:}
    dashboard-url: ${RESQ_DASHBOARD_URL:http://localhost:1420}
  storage:
    sqlite-path: ${RESQ_SQLITE_PATH:${user.home}/.resq-localhub/hub-api.sqlite}
  mqtt:
    broker-url: ${RESQ_MQTT_BROKER_URL:tcp://localhost:1883}
    advertised-host: ${RESQ_MQTT_ADVERTISED_HOST:}
    port: ${RESQ_MQTT_PORT:1883}
    client-id: ${RESQ_MQTT_CLIENT_ID:hub-api-live-registry}
    command-client-id: ${RESQ_MQTT_COMMAND_CLIENT_ID:hub-api-session-commands}
    username: ${RESQ_MQTT_USERNAME:}
    password: ${RESQ_MQTT_PASSWORD:}
  live:
    stale-after-seconds: ${RESQ_LIVE_STALE_AFTER_SECONDS:12}
    stale-check-interval-ms: ${RESQ_LIVE_STALE_CHECK_INTERVAL_MS:2000}
  cloud-sync:
    enabled: ${RESQ_CLOUD_SYNC_ENABLED:true}
    base-url: ${RESQ_CLOUD_SYNC_BASE_URL:https://cj7hzrfn6l.execute-api.ap-southeast-1.amazonaws.com}
    hub-id: ${RESQ_CLOUD_SYNC_HUB_ID:${RESQ_ROSTER_SYNC_HUB_ID:hub-dev-01}}
    hub-key: ${RESQ_CLOUD_SYNC_HUB_KEY:${RESQ_ROSTER_SYNC_HUB_KEY:dev-localhub-key-2026}}
    batch-size: ${RESQ_CLOUD_SYNC_BATCH_SIZE:5}
    fixed-delay-ms: ${RESQ_CLOUD_SYNC_FIXED_DELAY_MS:60000}
    request-timeout-ms: ${RESQ_CLOUD_SYNC_REQUEST_TIMEOUT_MS:5000}
    max-retry-count: ${RESQ_CLOUD_SYNC_MAX_RETRY_COUNT:3}

  roster-sync:
    enabled: ${RESQ_ROSTER_SYNC_ENABLED:true}
    base-url: ${RESQ_ROSTER_SYNC_BASE_URL:https://cj7hzrfn6l.execute-api.ap-southeast-1.amazonaws.com}
    hub-id: ${RESQ_ROSTER_SYNC_HUB_ID:hub-dev-01}
    hub-key: ${RESQ_ROSTER_SYNC_HUB_KEY:dev-localhub-key-2026}
    fixed-delay-ms: ${RESQ_ROSTER_SYNC_FIXED_DELAY_MS:60000}
    timeout-ms: ${RESQ_ROSTER_SYNC_TIMEOUT_MS:10000}
  cpr-performance:
    compression-depth-min-mm: ${RESQ_CPR_COMPRESSION_DEPTH_MIN_MM:50}
    compression-depth-max-mm: ${RESQ_CPR_COMPRESSION_DEPTH_MAX_MM:60}
    compression-rate-min-cpm: ${RESQ_CPR_COMPRESSION_RATE_MIN_CPM:100}
    compression-rate-max-cpm: ${RESQ_CPR_COMPRESSION_RATE_MAX_CPM:120}
    bad-performance-overall-score-threshold: ${RESQ_CPR_BAD_PERFORMANCE_OVERALL_SCORE_THRESHOLD:70}
    bad-performance-depth-accuracy-threshold: ${RESQ_CPR_BAD_PERFORMANCE_DEPTH_ACCURACY_THRESHOLD:70}
    bad-performance-rate-accuracy-threshold: ${RESQ_CPR_BAD_PERFORMANCE_RATE_ACCURACY_THRESHOLD:70}
    recoil-error-threshold-percent: ${RESQ_CPR_RECOIL_ERROR_THRESHOLD_PERCENT:15}
    consistency-score-threshold: ${RESQ_CPR_CONSISTENCY_SCORE_THRESHOLD:70}
    fatigue-drop-threshold-percent: ${RESQ_CPR_FATIGUE_DROP_THRESHOLD_PERCENT:10}
    excessive-pause-count-threshold: ${RESQ_CPR_EXCESSIVE_PAUSE_COUNT_THRESHOLD:2}
    excessive-longest-pause-seconds-threshold: ${RESQ_CPR_EXCESSIVE_LONGEST_PAUSE_SECONDS_THRESHOLD:2.5}
