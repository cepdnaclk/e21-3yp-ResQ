name: LocalHub Backend Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Maven Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: code/resq-localhub/services/hub-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: code/resq-localhub/services/hub-api/pom.xml

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run complete test suite
        run: ./mvnw --batch-mode --no-transfer-progress test
