name: ResQ firmware

on:
  push:
    paths:
      - "code/resq-firmware/**"
      - ".github/workflows/resq-firmware.yml"
  pull_request:
    paths:
      - "code/resq-firmware/**"
      - ".github/workflows/resq-firmware.yml"

jobs:
  deploy-test-host:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: code/resq-firmware/deploy_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: code/resq-firmware/deploy_test/requirements.txt

      - name: Install deployment test dependencies
        run: python -m pip install -r requirements.txt

      - name: Test deployment qualification host package
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v6.0
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Build production firmware
        working-directory: code/resq-firmware
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32c3
          idf.py build

      - name: Build Unity test firmware
        working-directory: code/resq-firmware/test
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32c3
          idf.py build

      - name: Upload firmware images
        uses: actions/upload-artifact@v4
        with:
          name: resq-firmware-images
          path: |
            code/resq-firmware/build/*.bin
            code/resq-firmware/test/build/*.bin
          if-no-files-found: error
